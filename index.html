<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="./manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Secure Chat (IPv6 Ready)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    :root {
        /* Material Design 3 Dark Theme Colors */
        --md-sys-color-background: #1c1b1f;
        --md-sys-color-surface: #282a2d;
        --md-sys-color-surface-variant: #44474e;
        --md-sys-color-primary: #a8c7fa;
        --md-sys-color-on-primary: #062e6f;
        --md-sys-color-primary-container: #004a77;
        --md-sys-color-on-primary-container: #c2e7ff;
        --md-sys-color-secondary-container: #4a4458;
        --md-sys-color-on-surface: #e3e2e6;
        --md-sys-color-on-surface-variant: #c4c6d0;
        --md-sys-color-error: #ffb4ab;
        
        --bg-deep: var(--md-sys-color-background); 
        --bg-panel: var(--md-sys-color-surface); 
        --text-main: var(--md-sys-color-on-surface);
        --text-dim: var(--md-sys-color-on-surface-variant); 
        --accent: var(--md-sys-color-primary); 
        --accent-hover: #b9d4ff;
        --bubble-me: var(--md-sys-color-primary-container); 
        --bubble-peer: var(--md-sys-color-surface-variant); 
        --input-bg: var(--md-sys-color-secondary-container);
        --danger: var(--md-sys-color-error); 
        --shadow: rgba(0,0,0,0.3); 
        --dropdown-hover: rgba(255,255,255,0.08);
        --tick-color: var(--text-dim); 
        --tick-read: var(--md-sys-color-primary); 
        --avatar-bg: var(--md-sys-color-primary-container);
        --avatar-color: var(--md-sys-color-on-primary-container); 
        --modal-overlay: rgba(0,0,0,0.6);
    }
    
    body.light-theme {
        /* Material Design 3 Light Theme Colors */
        --md-sys-color-background: #fffbff;
        --md-sys-color-surface: #f3f3f9;
        --md-sys-color-surface-variant: #e1e2ec;
        --md-sys-color-primary: #0b57d0;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-primary-container: #d3e3fd;
        --md-sys-color-on-primary-container: #041e49;
        --md-sys-color-secondary-container: #e8def8;
        --md-sys-color-on-surface: #1c1b1f;
        --md-sys-color-on-surface-variant: #44474f;
        --md-sys-color-error: #ba1a1a;

        --bg-deep: var(--md-sys-color-background); 
        --bg-panel: var(--md-sys-color-surface); 
        --text-main: var(--md-sys-color-on-surface);
        --text-dim: var(--md-sys-color-on-surface-variant); 
        --accent: var(--md-sys-color-primary); 
        --accent-hover: #0842a0;
        --bubble-me: var(--md-sys-color-primary-container); 
        --bubble-peer: var(--md-sys-color-surface-variant); 
        --input-bg: var(--md-sys-color-secondary-container);
        --danger: var(--md-sys-color-error); 
        --shadow: rgba(0,0,0,0.1); 
        --dropdown-hover: rgba(0,0,0,0.05);
        --tick-color: var(--text-dim); 
        --tick-read: var(--md-sys-color-primary); 
        --avatar-bg: var(--md-sys-color-primary-container);
        --modal-overlay: rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background-color: var(--bg-deep); color: var(--text-main); font-family: 'Roboto', sans-serif; overflow: hidden; transition: background-color 0.3s ease; }
    
    /* Typography & Core Adjustments */
    button { font-family: 'Roboto', sans-serif; letter-spacing: 0.1px; }
    
    .menu-btn { background: none; border: none; color: var(--text-main); font-size: 24px; font-weight: 500; cursor: pointer; padding: 8px; border-radius: 50%; transition: background 0.2s; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .menu-btn:hover { background: var(--dropdown-hover); }

    /* Modals & Dropdowns (MD3 Large Border Radius) */
    .dropdown { position: absolute; top: 50px; right: 10px; background: var(--bg-panel); border: none; border-radius: 16px; box-shadow: 0 4px 20px var(--shadow); display: none; flex-direction: column; min-width: 200px; overflow: hidden; z-index: 1000; padding: 8px 0; }
    .dropdown.show { display: flex; }
    .dropdown button { background: transparent; border: none; color: var(--text-main); padding: 12px 20px; text-align: left; cursor: pointer; font-size: 14px; width: 100%; transition: background 0.2s; font-weight: 500;}
    .dropdown button:hover { background: var(--dropdown-hover); }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); display: none; align-items: center; justify-content: center; z-index: 2000; opacity: 0; transition: opacity 0.2s ease; backdrop-filter: blur(2px); }
    .modal-overlay.show { display: flex; opacity: 1; }
    .modal-content { background: var(--bg-panel); padding: 28px; border-radius: 28px; width: 90%; max-width: 360px; box-shadow: 0 10px 30px var(--shadow); text-align: center; transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1); }
    .modal-overlay.show .modal-content { transform: scale(1); }
    .modal-content h3 { margin-bottom: 24px; font-size: 22px; font-weight: 500; color: var(--text-main); }

    /* Avatars */
    .avatar-edit-container { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 24px; }
    .avatar-preview-large { width: 96px; height: 96px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .avatar-preview-large img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-preview-large svg { width: 50%; height: 50%; fill: var(--avatar-color); }
    
    /* Buttons MD3 Style */
    .edit-avatar-btn, .modal-actions button, #connect-btn, #refresh-network-btn, .img-modal-btn { padding: 10px 24px; border-radius: 100px; border: none; font-weight: 500; cursor: pointer; font-size: 14px; transition: 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .edit-avatar-btn { background: var(--md-sys-color-secondary-container); color: var(--text-main); }
    .edit-avatar-btn:hover { background: rgba(134,150,160,0.3); }
    
    #close-modal-btn, .img-modal-btn { background: transparent; color: var(--accent); }
    #close-modal-btn:hover, .img-modal-btn:hover { background: var(--dropdown-hover); }
    
    #save-account-btn, #connect-btn { background: var(--accent); color: var(--md-sys-color-on-primary); }
    #save-account-btn:hover, #connect-btn:hover { background: var(--accent-hover); box-shadow: 0 1px 3px var(--shadow); }
    
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

    /* Inputs MD3 Style */
    .modal-input-group, .input-group { text-align: left; margin-bottom: 20px; }
    .modal-input-group label, .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; padding-left: 16px; }
    .modal-input-group input, .login-card input { width: 100%; padding: 16px 20px; border-radius: 28px; border: none; background: var(--input-bg); color: var(--text-main); font-size: 16px; outline: none; transition: background 0.2s; }
    .modal-input-group input:focus, .login-card input:focus { background: var(--bg-panel); box-shadow: inset 0 0 0 2px var(--accent); }

    /* Login Screen & Cards */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; position: relative; }
    .login-card { background: var(--bg-panel); padding: 40px 30px; border-radius: 28px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px var(--shadow); }
    .login-card h1 { font-size: 24px; font-weight: 500; margin-bottom: 30px; color: var(--text-main); }
    
    .role-btn { width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 16px; border: 1px solid var(--md-sys-color-surface-variant); background: var(--md-sys-color-surface); color: var(--text-main); font-weight: 500; font-size: 16px; cursor: pointer; transition: 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .role-btn:hover { background: var(--md-sys-color-surface-variant); }
    .role-btn svg { stroke: var(--accent); }

    /* Chat Screen */
    header { flex-shrink: 0; background-color: var(--bg-panel); padding: 12px 20px; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 3px var(--shadow); }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background-color: var(--avatar-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .avatar svg { width: 60%; height: 60%; fill: var(--avatar-color); }
    .header-title { font-weight: 500; font-size: 18px; color: var(--text-main); }
    
    #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-color: var(--bg-deep); }
    
    /* Bubbles MD3 */
    .msg { display: inline-block; max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; line-height: 1.4; }
    .msg.sent { align-self: flex-end; background: var(--bubble-me); color: var(--md-sys-color-on-primary-container); border-bottom-right-radius: 4px; }
    .msg.received { align-self: flex-start; background: var(--bubble-peer); color: var(--text-main); border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: var(--md-sys-color-surface-variant); color: var(--text-main); font-size: 12px; padding: 8px 16px; border-radius: 100px; font-weight: 500; }
    
    /* Footer & Input MD3 */
    footer { flex-shrink: 0; background: var(--bg-panel); padding: 12px 20px; display: flex; gap: 12px; align-items: center; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    .input-wrapper { flex: 1; background: var(--input-bg); border-radius: 32px; display: flex; align-items: center; padding: 4px 16px; }
    #message-input { flex: 1; background: transparent; border: none; color: var(--text-main); padding: 12px 0; font-size: 16px; outline: none; }
    
    #send-btn { width: 48px; height: 48px; background: var(--accent); border: none; border-radius: 50%; color: var(--md-sys-color-on-primary); font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.2s, box-shadow 0.2s; }
    #send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    
    .icon-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-dim); transition: 0.2s; padding: 8px; border-radius: 50%; }
    .icon-btn:hover { background: var(--dropdown-hover); color: var(--text-main); }

    /* Other Utilities */
    .id-badge { background: var(--md-sys-color-secondary-container); color: var(--text-main); font-family: monospace; padding: 8px 16px; border-radius: 12px; letter-spacing: 1px; }
    .my-id-box { background: transparent; border: none; }
    .status-text { margin-top: 20px; font-size: 14px; font-weight: 500; color: var(--accent); }
</style>
</head>
<body>

    <div id="account-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Pengaturan Akun</h3>
            <div class="avatar-edit-container">
                <div class="avatar-preview-large" id="modal-avatar-preview">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                </div>
                <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                <button class="edit-avatar-btn" onclick="document.getElementById('avatar-input').click()">Ubah Foto</button>
            </div>
            
            <div class="modal-input-group">
                <label for="modal-name-input">NAMA TAMPILAN</label>
                <input type="text" id="modal-name-input" placeholder="Masukkan nama Anda..." autocomplete="off">
            </div>

            <div class="my-id-box">
                <p>ID JARINGAN ANDA (KLIK UNTUK COPY)</p>
                <span id="my-id" class="id-badge" title="Klik untuk Copy">Connecting...</span>
            </div>

            <div class="modal-actions">
                <button id="close-modal-btn">Batal</button>
                <button id="save-account-btn">Simpan</button>
            </div>
        </div>
    </div>

    <div id="log-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; width: 95%;">
            <h3>Log Diagnostik Koneksi</h3>
            <div id="log-container" class="log-container"></div>
            <button id="close-log-btn" style="width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: var(--input-bg); color: var(--text-main);">Tutup</button>
        </div>
    </div>

    <div id="image-viewer-modal" class="modal-overlay">
        <div class="modal-content" style="background: transparent; box-shadow: none; max-width: 95vw; padding: 0;">
            <img id="enlarged-img" src="" style="max-width: 100%; max-height: 75vh; border-radius: 8px; object-fit: contain; background: rgba(0,0,0,0.5);">
            <div style="display: flex; gap: 8px; margin-top: 15px; justify-content: center; flex-wrap: wrap;">
                <button id="img-save-btn" class="img-modal-btn">Simpan</button>
                <button id="img-reply-btn" class="img-modal-btn">Balas</button>
                <button id="img-delete-btn" class="img-modal-btn" style="color: var(--danger);">Hapus</button>
                <button id="img-close-btn" class="img-modal-btn">Tutup</button>
            </div>
        </div>
    </div>

    <div id="msg-action-overlay" class="modal-overlay">
        <div class="msg-menu-content">
            <button id="msg-reply-btn">Balas</button>
            <button id="msg-copy-btn">Salin</button>
            <button id="msg-delete-btn">Hapus di saya</button>
        </div>
    </div>

    <div id="login-screen">
        <div class="top-right-menu">
            <button class="account-btn" style="background: var(--input-bg); border: none; color: var(--text-main); padding: 8px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px;">👤 Akun</button>
            <button id="menu-toggle-btn" class="menu-btn">⋮</button>
            <div id="dropdown-menu" class="dropdown">
                <button id="theme-btn">Ganti Tema</button>
                <button id="log-btn">Log Sistem</button>
                <button id="cache-btn">Hapus Cache</button>
            </div>
        </div>
        
        <div class="login-card">
            <h1>P2P SECURE CHAT</h1>
            
            <div id="role-selection">
                <p style="margin-bottom: 20px; color: var(--text-dim); font-size: 14px;">Pilih peran Anda untuk memulai:</p>
                <button class="role-btn" onclick="selectRole('sender')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    Saya Pengirim
                </button>
                <button class="role-btn" onclick="selectRole('receiver')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Saya Penerima
                </button>
            </div>

            <div id="sender-ui" style="display: none;">
                <div class="input-group">
                    <label for="remote-id">MASUKKAN ID PENERIMA</label>
                    <input type="text" id="remote-id" placeholder="Tempel ID Teman di sini">
                </div>
                <button id="connect-btn" onclick="connectToPeer()">Mulai Chat</button>
                <button class="back-btn" onclick="resetRole()">Kembali</button>
            </div>

            <div id="receiver-ui" style="display: none;">
                <div style="background: var(--input-bg); padding: 20px; border-radius: 8px; margin-bottom: 15px;">
                    <p style="font-weight: bold; color: var(--accent); margin-bottom: 10px;">⏳ Menunggu Koneksi Masuk...</p>
                    <p style="font-size: 12px; color: var(--text-dim);">Berikan ID Anda ke Pengirim:</p>
                    <div id="my-id-display" class="id-badge" style="margin-top: 5px; background: rgba(0, 168, 132, 0.1); cursor: pointer;" title="Klik untuk Copy">Loading...</div>
                </div>
                <div id="receiver-log" class="log-container" style="height: 120px; margin-bottom: 5px; font-size: 11px;"></div>
                <button class="back-btn" onclick="resetRole()">Kembali</button>
            </div>

            <div id="login-status" class="status-text">Menyiapkan jaringan...</div>
            <button id="refresh-network-btn" onclick="window.location.reload()">🔄 Refresh Jaringan</button>
        </div>
    </div>

    <div id="chat-screen">
        <header>
            <div class="header-left">
                <div class="avatar" id="chat-header-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                </div>
                <div class="header-info">
                    <span class="header-title" id="chat-title">Teman</span>
                    <span class="header-status">Terhubung</span>
                </div>
            </div>
            <div class="header-actions">
                <div style="position: relative;">
                    <button id="menu-toggle-chat-btn" class="menu-btn">⋮</button>
                    <div id="dropdown-menu-chat" class="dropdown" style="top: 35px;">
                        <button id="mute-btn">Bisukan Notifikasi</button>
                        <button id="search-btn">Cari</button>
                        <button class="account-btn">Akun</button>
                        <button id="theme-chat-btn">Ganti Tema</button>
                        <button id="clear-chat-btn">Hapus Chat</button>
                        <button id="disconnect-menu-btn" style="color: var(--danger); font-weight: bold;" onclick="disconnectPeer()">Putus Koneksi</button>
                    </div>
                </div>
            </div>
        </header>

        <div id="chat-window"></div>
        
        <div id="typing-indicator"><span id="typer-name">Teman</span> sedang mengetik...</div>

        <footer>
            <div id="reply-preview-container">
                <div class="reply-box">
                    <button class="cancel-reply" onclick="cancelReply()">✕</button>
                    <span class="reply-name" id="reply-preview-name">Name</span>
                    <div class="reply-text" id="reply-preview-text">Message</div>
                </div>
            </div>
            <input type="file" id="file-input" style="display: none;">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Lampirkan File">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendMessage()" autocomplete="off">
            </div>
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </footer>
    </div>

    <script>
        let incomingFiles = {};
        const CHUNK_SIZE = 64 * 1024; 
        let connectTimeout; 

        // === MANAJEMEN AKUN ===
        const accountModal = document.getElementById('account-modal');
        const modalNameInput = document.getElementById('modal-name-input');
        const modalAvatarPreview = document.getElementById('modal-avatar-preview');
        const defaultSvgAvatar = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>`;

        let myName = localStorage.getItem('my-chat-name') || '';
        let myAvatarBase64 = localStorage.getItem('my-chat-avatar') || '';

        function openAccountModal() { 
            modalNameInput.value = myName; 
            modalAvatarPreview.innerHTML = myAvatarBase64 ? `<img src="${myAvatarBase64}" alt="Avatar">` : defaultSvgAvatar; 
            accountModal.classList.add('show'); 
            document.getElementById('dropdown-menu').classList.remove('show'); 
            document.getElementById('dropdown-menu-chat').classList.remove('show'); 
        }
        document.querySelectorAll('.account-btn').forEach(btn => btn.addEventListener('click', openAccountModal));
        document.getElementById('close-modal-btn').addEventListener('click', () => accountModal.classList.remove('show'));

        document.getElementById('avatar-input').addEventListener('change', (e) => { 
            const file = e.target.files[0]; 
            if (!file) return; 
            if (file.size > 2 * 1024 * 1024) return alert("Ukuran foto profil terlalu besar! Maksimal 2MB."); 
            const reader = new FileReader(); 
            reader.onload = function(evt) { 
                myAvatarBase64 = evt.target.result; 
                modalAvatarPreview.innerHTML = `<img src="${myAvatarBase64}" alt="Avatar">`; 
            }; 
            reader.readAsDataURL(file); 
        });
        
        document.getElementById('save-account-btn').addEventListener('click', () => { 
            myName = modalNameInput.value.trim(); 
            localStorage.setItem('my-chat-name', myName); 
            localStorage.setItem('my-chat-avatar', myAvatarBase64); 
            accountModal.classList.remove('show'); 
            if (conn && conn.open) conn.send({ type: 'profile', name: myName || "Anonim", avatar: myAvatarBase64 }); 
        });

        // === MANAJEMEN UI UMUM & TEMA ===
        let isMuted = false;
        document.getElementById('menu-toggle-btn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('dropdown-menu').classList.toggle('show'); });
        document.getElementById('menu-toggle-chat-btn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('dropdown-menu-chat').classList.toggle('show'); });
        document.addEventListener('click', (e) => { 
            if (!accountModal.contains(e.target) && !e.target.classList.contains('account-btn')) { 
                document.getElementById('dropdown-menu').classList.remove('show'); 
                document.getElementById('dropdown-menu-chat').classList.remove('show'); 
            } 
        });

        if (localStorage.getItem('app-theme') === 'light') document.body.classList.add('light-theme');
        function toggleTheme() { 
            document.body.classList.toggle('light-theme'); 
            localStorage.setItem('app-theme', document.body.classList.contains('light-theme') ? 'light' : 'dark'); 
            document.getElementById('dropdown-menu').classList.remove('show'); 
            document.getElementById('dropdown-menu-chat').classList.remove('show'); 
        }
        document.getElementById('theme-btn').addEventListener('click', toggleTheme); 
        document.getElementById('theme-chat-btn').addEventListener('click', toggleTheme);

        document.getElementById('cache-btn').addEventListener('click', async () => { 
            if (confirm("Hapus semua cache dan mulai ulang? (Ini juga akan mereset ID Jaringan Anda)")) { 
                localStorage.clear(); 
                if ('serviceWorker' in navigator) { try { const regs = await navigator.serviceWorker.getRegistrations(); for (let reg of regs) await reg.unregister(); } catch(e) {} } 
                if ('caches' in window) { try { const keys = await caches.keys(); for (let key of keys) await caches.delete(key); } catch(e) {} } 
                window.location.reload(true); 
            } 
        });
        
        document.getElementById('mute-btn').addEventListener('click', () => { 
            isMuted = !isMuted; 
            document.getElementById('mute-btn').innerText = isMuted ? "Aktifkan Notifikasi" : "Bisukan Notifikasi"; 
            document.getElementById('dropdown-menu-chat').classList.remove('show'); 
        });
        
        document.getElementById('search-btn').addEventListener('click', () => { 
            document.getElementById('dropdown-menu-chat').classList.remove('show'); 
            const keyword = prompt("Masukkan kata kunci pencarian:"); 
            if (keyword) window.find(keyword); 
        });
        
        document.getElementById('clear-chat-btn').addEventListener('click', () => { 
            if (confirm("Bersihkan layar percakapan?")) { document.getElementById('chat-window').innerHTML = ''; } 
            document.getElementById('dropdown-menu-chat').classList.remove('show'); 
        });

        // === SISTEM TINDAKAN PESAN ===
        const msgActionOverlay = document.getElementById('msg-action-overlay');
        let activeReply = null; let selectedMsgDiv = null; let selectedMsgObj = null;

        function setupLongPress(element, msgObj) { 
            let pressTimer; let isTouching = false; 
            const start = (e) => { 
                if (e.type === 'touchstart') isTouching = true; 
                if (e.type === 'mousedown' && isTouching) return; 
                pressTimer = setTimeout(() => openMsgMenu(element, msgObj), 600); 
            }; 
            const end = () => clearTimeout(pressTimer); 
            element.addEventListener('touchstart', start, {passive: true}); 
            element.addEventListener('touchend', end); 
            element.addEventListener('touchmove', end); 
            element.addEventListener('mousedown', start); 
            element.addEventListener('mouseup', end); 
            element.addEventListener('mouseleave', end); 
            element.addEventListener('contextmenu', (e) => { e.preventDefault(); openMsgMenu(element, msgObj); }); 
        }
        
        function openMsgMenu(element, obj) { 
            selectedMsgDiv = element; 
            selectedMsgObj = obj; 
            if (navigator.vibrate) navigator.vibrate(50); 
            msgActionOverlay.classList.add('show'); 
        }
        msgActionOverlay.addEventListener('click', function(e) { if(e.target === this) this.classList.remove('show'); });
        
        document.getElementById('msg-reply-btn').addEventListener('click', () => { 
            activeReply = selectedMsgObj; 
            document.getElementById('reply-preview-name').innerText = activeReply.sender; 
            document.getElementById('reply-preview-text').innerText = activeReply.text; 
            document.getElementById('reply-preview-container').style.display = 'block'; 
            document.getElementById('message-input').focus(); 
            msgActionOverlay.classList.remove('show'); 
        });
        
        document.getElementById('msg-copy-btn').addEventListener('click', () => { 
            navigator.clipboard.writeText(selectedMsgObj.text).catch(e => console.log('Gagal salin', e)); 
            msgActionOverlay.classList.remove('show'); 
        });
        
        document.getElementById('msg-delete-btn').addEventListener('click', () => { 
            if (selectedMsgDiv) selectedMsgDiv.remove(); 
            msgActionOverlay.classList.remove('show'); 
        });
        
        function cancelReply() { activeReply = null; document.getElementById('reply-preview-container').style.display = 'none'; }

        // === MODAL IMAGE VIEWER ===
        let currentEnlargedFile = null;
        function openImageViewer(imgSrc, msgDiv, msgObj, filename) {
            document.getElementById('enlarged-img').src = imgSrc;
            selectedMsgDiv = msgDiv;
            selectedMsgObj = msgObj;
            currentEnlargedFile = { src: imgSrc, name: filename };
            document.getElementById('image-viewer-modal').classList.add('show');
        }

        document.getElementById('img-close-btn').addEventListener('click', () => { document.getElementById('image-viewer-modal').classList.remove('show'); });
        document.getElementById('img-save-btn').addEventListener('click', () => {
            const a = document.createElement('a'); a.href = currentEnlargedFile.src; a.download = currentEnlargedFile.name || 'image.png';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });
        document.getElementById('img-reply-btn').addEventListener('click', () => {
            activeReply = selectedMsgObj; 
            document.getElementById('reply-preview-name').innerText = activeReply.sender; 
            document.getElementById('reply-preview-text').innerText = "📷 Foto"; 
            document.getElementById('reply-preview-container').style.display = 'block'; 
            document.getElementById('message-input').focus(); 
            document.getElementById('image-viewer-modal').classList.remove('show');
        });
        document.getElementById('img-delete-btn').addEventListener('click', () => {
            if (selectedMsgDiv) selectedMsgDiv.remove(); 
            document.getElementById('image-viewer-modal').classList.remove('show');
        });

        // === SISTEM LOG & NOTIFIKASI ===
        document.getElementById('log-btn').addEventListener('click', () => { 
            document.getElementById('log-modal').classList.add('show'); 
            document.getElementById('dropdown-menu').classList.remove('show'); 
        });
        document.getElementById('close-log-btn').addEventListener('click', () => { 
            document.getElementById('log-modal').classList.remove('show'); 
        });

        function logDebug(message, type = 'system') {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            div.innerHTML = `[${time}] ${message}`;
            container.appendChild(div); container.scrollTop = container.scrollHeight;

            const receiverLog = document.getElementById('receiver-log');
            if (receiverLog && document.getElementById('receiver-ui').style.display !== 'none') {
                const recDiv = div.cloneNode(true);
                receiverLog.appendChild(recDiv); receiverLog.scrollTop = receiverLog.scrollHeight;
            }
        }

        const notificationSound = new Audio('https://actions.google.com/sounds/v1/water/droplet_1.ogg');
        function playNotification() { if (!isMuted) notificationSound.play().catch(() => {}); }

        function selectRole(role) {
            document.getElementById('role-selection').style.display = 'none';
            if (role === 'sender') { document.getElementById('sender-ui').style.display = 'block'; } 
            else { document.getElementById('receiver-ui').style.display = 'block'; document.getElementById('my-id-display').innerText = peer.id || 'Loading...'; }
        }
        
        function resetRole() {
            document.getElementById('sender-ui').style.display = 'none';
            document.getElementById('receiver-ui').style.display = 'none';
            document.getElementById('role-selection').style.display = 'block';
        }

        document.getElementById('my-id-display').addEventListener('click', function() {
            if (this.innerText === 'Loading...' || this.innerText === 'Tersalin!') return;
            navigator.clipboard.writeText(this.innerText).then(() => {
                const original = this.innerText; this.innerText = 'Tersalin!'; this.style.color = '#53bdeb';
                setTimeout(() => { this.innerText = original; this.style.color = 'inherit'; }, 2000);
            });
        });


        // === KONEKSI PEERJS (OPTIMASI IPv6 STUN) ===
        let savedPeerId = localStorage.getItem('my-peer-id');
        
        // Kita HAPUS server TURN yang mati/lambat, 
        // dan tambahkan banyak STUN server andal dari Google & Cloudflare
        // agar WebRTC bisa menemukan kandidat jaringan IPv6.
        const peerConfig = { 
            config: { 
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' }, 
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' }
                ] 
            },
            debug: 3 
        };

        const peer = savedPeerId ? new Peer(savedPeerId, peerConfig) : new Peer(peerConfig);
        
        let conn, typingTimeout;
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const chatTitle = document.getElementById('chat-title');
        const typerNameSpan = document.getElementById('typer-name');
        const chatHeaderAvatar = document.getElementById('chat-header-avatar');
        let remoteName = "Teman";

        peer.on('open', id => { 
            if (!savedPeerId) { localStorage.setItem('my-peer-id', id); savedPeerId = id; }
            document.getElementById('my-id').innerText = id;
            document.getElementById('my-id-display').innerText = id;
            document.getElementById('login-status').innerText = "Sistem P2P siap digunakan."; 
            document.getElementById('login-status').style.color = "var(--accent)"; 
            logDebug(`Sistem Siap. ID Anda: ${id}`, 'success');
        });
        
        document.getElementById('my-id').addEventListener('click', function() { 
            if (this.innerText === 'Connecting...' || this.innerText === 'Tersalin!') return; 
            navigator.clipboard.writeText(this.innerText).then(() => { 
                this.innerText = 'Tersalin!'; this.style.color = '#53bdeb'; 
                setTimeout(() => { this.innerText = peer.id; this.style.color = 'var(--accent)'; }, 2000); 
            }); 
        });
        
        peer.on('error', (err) => { 
            clearTimeout(connectTimeout); 
            document.getElementById('login-status').innerText = '⚠ ERROR: ' + err.type; 
            document.getElementById('login-status').style.color = "var(--danger)"; 
            document.getElementById('refresh-network-btn').style.display = 'block'; 
            logDebug(`PeerJS Error: ${err.type}`, 'error');
            if (err.type === 'unavailable-id') { localStorage.removeItem('my-peer-id'); alert('ID aktif di tab lain. Refresh...'); window.location.reload(); } 
            else if(err.type === 'peer-unavailable') { alert('ID Teman offline.'); document.getElementById('connect-btn').innerText = "Mulai Chat"; document.getElementById('connect-btn').disabled = false; } 
        });

        function monitorICE(connection) {
            setTimeout(() => {
                if(connection && connection.peerConnection) {
                    connection.peerConnection.addEventListener('iceconnectionstatechange', () => {
                        const state = connection.peerConnection.iceConnectionState;
                        logDebug(`Status Jaringan WebRTC: <b>${state.toUpperCase()}</b>`);
                        if(state === 'failed' || state === 'disconnected') {
                            logDebug('Gagal koneksi. Pastikan IPv6 aktif di kedua perangkat.', 'error');
                            document.getElementById('message-input').disabled = true;
                        } else if (state === 'connected' || state === 'completed') {
                            logDebug('Jalur P2P berhasil diamankan!', 'success');
                            document.getElementById('message-input').disabled = false;
                        }
                    });
                }
            }, 1000);
        }

        peer.on('connection', connection => { 
            if(conn) conn.close(); conn = connection; 
            document.getElementById('login-screen').style.display = 'none'; document.getElementById('chat-screen').style.display = 'flex'; chatWindow.innerHTML = '';
            logDebug('Menerima koneksi masuk...', 'success'); monitorICE(conn); setupConn(); 
        });

        function connectToPeer() {
            const rId = document.getElementById('remote-id').value.trim();
            if(!rId || rId === peer.id) return alert(!rId ? "Masukkan ID!" : "Tidak bisa dengan diri sendiri!");
            document.getElementById('connect-btn').innerText = "Mencari..."; document.getElementById('connect-btn').disabled = true;
            logDebug(`Menghubungkan ke: ${rId}`);
            conn = peer.connect(rId); monitorICE(conn); setupConn();
            clearTimeout(connectTimeout);
            connectTimeout = setTimeout(() => {
                if (conn && !conn.open) { alert("Waktu habis! Pastikan IPv6 aktif."); if(conn) conn.close(); resetUI(); }
            }, 15000);
        }

        function setupConn() {
            conn.on('open', () => {
                clearTimeout(connectTimeout); document.getElementById('login-screen').style.display = 'none'; document.getElementById('chat-screen').style.display = 'flex';
                logDebug('Handshake berhasil!', 'success');
                conn.send({ type: 'profile', name: myName || "Anonim", avatar: myAvatarBase64 });
            });
            conn.on('data', data => {
                if (data && data.type === 'profile') { remoteName = data.name || "Teman"; chatTitle.innerText = remoteName; typerNameSpan.innerText = remoteName; chatHeaderAvatar.innerHTML = data.avatar ? `<img src="${data.avatar}" alt="Avatar">` : defaultSvgAvatar; } 
                else if (data && data.type === 'ack') { const msgElement = document.getElementById(data.msgId); if (msgElement) { const tick = msgElement.querySelector('.tick'); if (tick) { tick.innerText = '✓✓'; tick.classList.add('read'); } } } 
                else if (data && data.type === 'text') { conn.send({ type: 'ack', msgId: data.id }); playNotification(); hideTyping(); appendMessage('received', data, data.id); } 
                else if (data && data.type === 'typing') { data.isTyping ? showTyping() : hideTyping(); } 
                else if (data && data.type === 'file-start') { incomingFiles[data.fileId] = { chunks: [], receivedSize: 0, metadata: data }; renderFileProgress('received', data.fileId, data.filename, 0); } 
                else if (data && data.type === 'file-chunk') { const fileData = incomingFiles[data.fileId]; if (fileData) { fileData.chunks.push(data.data); fileData.receivedSize += data.data.byteLength; updateFileProgress(data.fileId, Math.round((fileData.receivedSize / fileData.metadata.filesize) * 100)); } } 
                else if (data && data.type === 'file-end') { const fileData = incomingFiles[data.fileId]; if (fileData) { finalizeFileMessage('received', data.fileId, fileData.metadata.filename, fileData.metadata.filetype, new Blob(fileData.chunks, { type: fileData.metadata.filetype })); delete incomingFiles[data.fileId]; conn.send({ type: 'ack', msgId: data.fileId }); playNotification(); hideTyping(); } }
            });
            conn.on('close', () => { logDebug('Koneksi ditutup.', 'error'); setTimeout(resetUI, 1000); });
        }

        function showTyping() { document.getElementById('typing-indicator').style.display = 'block'; chatWindow.scrollTop = chatWindow.scrollHeight; }
        function hideTyping() { document.getElementById('typing-indicator').style.display = 'none'; }
        function disconnectPeer() { if(conn) conn.close(); document.getElementById('dropdown-menu-chat').classList.remove('show'); resetUI(); }
        
        function resetUI() {
            clearTimeout(connectTimeout); conn = null; document.getElementById('chat-screen').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; 
            document.getElementById('remote-id').value = ''; document.getElementById('connect-btn').innerText = "Mulai Chat"; document.getElementById('connect-btn').disabled = false; resetRole();
            remoteName = "Teman"; chatTitle.innerText = remoteName; typerNameSpan.innerText = remoteName; chatHeaderAvatar.innerHTML = defaultSvgAvatar; hideTyping(); cancelReply();
        }

        // === PENGIRIMAN PESAN ===
        messageInput.addEventListener('input', () => { if (conn && conn.open) { conn.send({ type: 'typing', isTyping: true }); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { conn.send({ type: 'typing', isTyping: false }); }, 1500); } });

        function sendMessage() {
            const msg = messageInput.value.trim();
            if(msg && conn && conn.open) {
                const msgId = 'msg-' + Date.now(); const msgData = { type: 'text', id: msgId, text: msg, replyTo: activeReply ? { sender: activeReply.sender, text: activeReply.text } : null };
                conn.send(msgData); conn.send({ type: 'typing', isTyping: false }); clearTimeout(typingTimeout);
                appendMessage('sent', msgData, msgId); messageInput.value = ''; messageInput.focus(); cancelReply();
            }
        }

        function processFile(file) {
            if (!file || !conn || !conn.open) return;
            if (file.size > 15 * 1024 * 1024) return alert("Maksimal 15MB.");
            const fileId = 'file-' + Date.now(); renderFileProgress('sent', fileId, file.name, 0);
            conn.send({ type: 'file-start', fileId: fileId, filename: file.name, filetype: file.type, filesize: file.size });
            let offset = 0; const reader = new FileReader();
            reader.onload = function(e) {
                conn.send({ type: 'file-chunk', fileId: fileId, data: e.target.result }); offset += e.target.result.byteLength;
                updateFileProgress(fileId, Math.round((offset / file.size) * 100));
                if (offset < file.size) { setTimeout(readNextChunk, 5); } else { conn.send({ type: 'file-end', fileId: fileId }); finalizeFileMessage('sent', fileId, file.name, file.type, file); }
            };
            function readNextChunk() { const slice = file.slice(offset, offset + CHUNK_SIZE); reader.readAsArrayBuffer(slice); }
            readNextChunk();
        }

        document.getElementById('file-input').addEventListener('change', (e) => { processFile(e.target.files[0]); e.target.value = ''; });

        function renderFileProgress(senderType, fileId, filename, progress) { const div = document.createElement('div'); div.className = `msg ${senderType}`; div.id = fileId; div.innerHTML = `<div class="msg-content"><div style="font-weight:bold; font-size:13px; margin-bottom:5px;">📄 ${filename}</div><div class="progress-wrapper"><div class="progress-bar" id="pb-${fileId}" style="width: ${progress}%"></div></div><div class="progress-text" id="pt-${fileId}">${progress}% Memproses...</div></div>`; chatWindow.appendChild(div); chatWindow.scrollTop = chatWindow.scrollHeight; }
        function updateFileProgress(fileId, progress) { const pb = document.getElementById(`pb-${fileId}`); const pt = document.getElementById(`pt-${fileId}`); if (pb && pt) { pb.style.width = `${progress}%`; pt.innerText = progress === 100 ? "Menyelesaikan..." : `${progress}% Mengirim...`; } }
        
        function finalizeFileMessage(senderType, fileId, filename, filetype, blob) { 
            const div = document.getElementById(fileId); if (!div) return; 
            const url = URL.createObjectURL(blob); let contentHTML = ''; const msgObj = { text: filetype.startsWith('image/') ? '📷 Foto' : `📄 ${filename}`, sender: senderType === 'sent' ? (myName || 'Anda') : remoteName };
            if (filetype.startsWith('image/')) { contentHTML = `<img src="${url}" alt="${filename}" id="img-${fileId}" style="cursor: zoom-in;">`; } else { contentHTML = `<a href="${url}" download="${filename}" class="file-link">📄 ${filename}</a>`; } 
            div.innerHTML = `<div class="msg-content">${contentHTML}</div>`; appendMeta(div, senderType); setupLongPress(div, msgObj); 
            if (filetype.startsWith('image/')) {
                const imgElement = div.querySelector(`#img-${fileId}`); imgElement.onload = () => { chatWindow.scrollTop = chatWindow.scrollHeight; };
                imgElement.addEventListener('click', (e) => { e.stopPropagation(); openImageViewer(url, div, msgObj, filename); });
            }
            chatWindow.scrollTop = chatWindow.scrollHeight; 
        }
        
        function appendMessage(type, dataObj, id = null) { 
            const text = dataObj.text || ""; const replyTo = dataObj.replyTo || null; const div = document.createElement('div'); div.className = `msg ${type}`; if (id) div.id = id; 
            if (replyTo && type !== 'system') { const replyDiv = document.createElement('div'); replyDiv.className = 'replied-snippet'; replyDiv.innerHTML = `<strong>${replyTo.sender}</strong><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:200px;">${replyTo.text}</span>`; div.appendChild(replyDiv); } 
            const content = document.createElement('div'); content.className = 'msg-content'; content.innerText = text; div.appendChild(content); 
            if (type !== 'system') { appendMeta(div, type); setupLongPress(div, { text: text, sender: type === 'sent' ? (myName || 'Anda') : remoteName }); } 
            chatWindow.appendChild(div); chatWindow.scrollTop = chatWindow.scrollHeight; 
        }
        
        function appendMeta(parentDiv, type) { const meta = document.createElement('div'); meta.className = 'msg-meta'; const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); const timeSpan = document.createElement('span'); timeSpan.innerText = timeStr; meta.appendChild(timeSpan); if (type === 'sent') { const tickSpan = document.createElement('span'); tickSpan.className = 'tick'; tickSpan.innerText = '✓'; meta.appendChild(tickSpan); } parentDiv.appendChild(meta); }
        const updateHeight = () => { document.body.style.height = window.visualViewport.height + 'px'; if(document.getElementById('chat-screen').style.display === 'flex') chatWindow.scrollTop = chatWindow.scrollHeight; }; window.visualViewport.addEventListener('resize', updateHeight); window.visualViewport.addEventListener('scroll', updateHeight);
    </script>
</body>
