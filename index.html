<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Secure Chat - Multi Network</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-deep: #0b141a;
            --bg-panel: #202c33;
            --text-main: #e9edef;
            --text-dim: #8696a0;
            --accent: #00a884;
            --bubble-me: #005c4b;
            --bubble-peer: #233138;
            --input-bg: #2a3942;
            --danger: #ea0038;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        body { display: flex; flex-direction: column; }

        header {
            flex-shrink: 0;
            background-color: var(--bg-panel);
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }

        .info-bar { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .id-badge { color: var(--accent); font-weight: bold; font-family: monospace; }

        .connect-area { display: flex; gap: 8px; }
        input#remote-id {
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            background: var(--input-bg); color: white; font-size: 14px; outline: none;
        }

        .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #connect-btn { background: var(--accent); color: #0b141a; }
        #disconnect-btn { background: var(--danger); color: white; display: none; }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: var(--bg-deep);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: multiply;
            background-size: 400px;
        }

        .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .msg.sent { align-self: flex-end; background: var(--bubble-me); border-top-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--bubble-peer); border-top-left-radius: 2px; }
        .msg.system { align-self: center; background: rgba(0,0,0,0.4); color: var(--text-dim); font-size: 11px; padding: 4px 12px; border-radius: 6px; text-align: center; }

        footer {
            flex-shrink: 0;
            background: var(--bg-panel);
            padding: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            position: relative;
        }

        #emoji-picker {
            position: absolute; bottom: 70px; left: 10px;
            background: var(--bg-panel); border: 1px solid var(--input-bg);
            border-radius: 12px; padding: 10px; display: none;
            grid-template-columns: repeat(6, 1fr); gap: 12px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6); z-index: 200;
        }

        .emoji-item { cursor: pointer; font-size: 22px; display: flex; justify-content: center; }

        .input-wrapper {
            flex: 1; background: var(--input-bg); border-radius: 24px;
            display: flex; align-items: center; padding: 0 12px;
        }

        #message-input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 12px 5px; font-size: 16px; outline: none;
        }

        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; opacity: 0.6; color: var(--text-dim); }

        #send-btn {
            width: 46px; height: 46px; background: var(--accent); border: none;
            border-radius: 50%; color: #0b141a; font-size: 20px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <div class="info-bar">
            <span>P2P Multi-Network Chat</span>
            <div>ID: <span id="my-id" class="id-badge">...</span></div>
        </div>
        <div class="connect-area">
            <input type="text" id="remote-id" placeholder="Masukkan ID Teman">
            <button id="connect-btn" class="btn" onclick="connectToPeer()">Connect</button>
            <button id="disconnect-btn" class="btn" onclick="disconnectPeer()">Batal</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="msg system">Gunakan ID untuk koneksi privat. Koneksi akan mencoba menembus firewall jaringan via STUN/TURN.</div>
    </div>

    <!-- Emoji Picker -->
    <div id="emoji-picker">
        <span class="emoji-item" onclick="addEmoji('😊')">😊</span>
        <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
        <span class="emoji-item" onclick="addEmoji('😍')">😍</span>
        <span class="emoji-item" onclick="addEmoji('👍')">👍</span>
        <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
        <span class="emoji-item" onclick="addEmoji('🤔')">🤔</span>
        <span class="emoji-item" onclick="addEmoji('😎')">😎</span>
        <span class="emoji-item" onclick="addEmoji('❤️')">❤️</span>
        <span class="emoji-item" onclick="addEmoji('✨')">✨</span>
        <span class="emoji-item" onclick="addEmoji('✅')">✅</span>
    </div>

    <footer>
        <button class="icon-btn" onclick="toggleEmoji()">😊</button>
        <div class="input-wrapper">
            <input type="text" id="message-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendMessage()" autocomplete="off">
        </div>
        <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </footer>

    <script>
        // UPDATE: Konfigurasi Masif untuk Lintas Jaringan
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' },
                    // TURN Server dari OpenRelay (Gratis)
                    {
                        urls: 'turn:openrelay.metered.ca:443',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    },
                    {
                        urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    }
                ],
                'sdpSemantics': 'unified-plan'
            }
        });

        let conn;
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const remoteIdInput = document.getElementById('remote-id');
        const emojiPicker = document.getElementById('emoji-picker');

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Debugging: Munculkan pesan jika ada error teknis
        peer.on('error', (err) => {
            console.error('PeerJS Error:', err.type);
            appendMessage('system', 'Error Terjadi: ' + err.type);
            if(err.type === 'peer--unavailable') alert('ID teman tidak ditemukan.');
            if(err.type === 'network') alert('Masalah jaringan. Pastikan anda menggunakan HTTPS.');
        });

        peer.on('connection', connection => {
            if(conn) connection.close();
            conn = connection;
            setupConn();
        });

        function connectToPeer() {
            const rId = remoteIdInput.value.trim();
            if(!rId || rId === peer.id) return;
            conn = peer.connect(rId);
            setupConn();
        }

        function setupConn() {
            conn.on('open', () => {
                sendBtn.disabled = false;
                connectBtn.style.display = 'none';
                remoteIdInput.style.display = 'none';
                disconnectBtn.style.display = 'block';
                appendMessage('system', 'KONEKSI BERHASIL (P2P Secured)');
            });
            conn.on('data', data => appendMessage('received', data));
            conn.on('close', resetUI);
        }

        function disconnectPeer() { if(conn) conn.close(); }

        function resetUI() {
            conn = null; sendBtn.disabled = true;
            connectBtn.style.display = 'block';
            remoteIdInput.style.display = 'block';
            disconnectBtn.style.display = 'none';
            appendMessage('system', 'Koneksi terputus.');
        }

        function sendMessage() {
            const msg = messageInput.value.trim();
            if(msg && conn && conn.open) {
                conn.send(msg);
                appendMessage('sent', msg);
                messageInput.value = '';
                emojiPicker.style.display = 'none';
                messageInput.focus();
            }
        }

        function toggleEmoji() { emojiPicker.style.display = emojiPicker.style.display === 'grid' ? 'none' : 'grid'; }
        function addEmoji(emoji) { messageInput.value += emoji; messageInput.focus(); }

        function appendMessage(type, text) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Fix Keyboard Mobile
        const fixHeight = () => {
            document.body.style.height = window.visualViewport.height + 'px';
            window.scrollTo(0, 0);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        };
        window.visualViewport.addEventListener('resize', fixHeight);

        peer.on('error', (err) => {
    console.log('Error Type:', err.type);
    // Jika muncul error 'unavailable-id', artinya ID teman salah atau sudah expired
    // Jika muncul 'network', artinya sinyal/jaringan memblokir P2P
    appendMessage('system', '⚠ ERROR: ' + err.type);
});

// Deteksi jika koneksi sedang berusaha menembus firewall
peer.on('call', (call) => {
    appendMessage('system', 'Mencoba menembus firewall...');
});
    </script>
</body>
</html>
